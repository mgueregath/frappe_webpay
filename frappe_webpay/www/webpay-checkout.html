{% extends "templates/web.html" %}

{% block page_content %}
<div style="text-align:center; padding:80px 20px">
    <p>Redirigiendo a Webpay…</p>
    <noscript>
        <p>Tu navegador no tiene JavaScript. Presiona el botón para continuar.</p>
    </noscript>

    <form id="webpay-form" method="post" action="{{ webpay_url }}">
        <input type="hidden" name="token_ws" value="{{ token }}">
        <noscript><button type="submit">Ir a pagar</button></noscript>
    </form>
</div>

<script>
    document.getElementById("webpay-form").submit();
</script>
{% endblock %}
